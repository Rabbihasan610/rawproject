<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D RGB Login Register</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f0f0f;
perspective:1200px;
}
.container{
width:380px;
transform-style:preserve-3d;
}
.card{
background:#111;
padding:40px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,255,.5),0 0 50px rgba(0,255,255,.3);
animation:rgb 6s linear infinite;
transform:rotateX(10deg) rotateY(-10deg);
}
@keyframes rgb{
0%{box-shadow:0 0 25px red}
33%{box-shadow:0 0 25px blue}
66%{box-shadow:0 0 25px lime}
100%{box-shadow:0 0 25px red}
}
h2{
text-align:center;
margin-bottom:25px;
color:white
}
.input-group{
margin-bottom:18px
}
input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1e1e1e;
color:white;
outline:none;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff00ff,#00ffff);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
button:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}
.switch{
text-align:center;
margin-top:15px;
color:#ccc;
cursor:pointer
}
</style>
</head>
<body>

<div class="container">

<div class="card" id="formCard">

<h2 id="title">Login</h2>

<div class="input-group">
<input type="email" placeholder="Email">
</div>

<div class="input-group">
<input type="password" placeholder="Password">
</div>

<button>Login</button>

<div class="switch" onclick="toggleForm()">
Don't have account? Register
</div>

</div>

</div>

<script>
function toggleForm(){
const title=document.getElementById('title');
const switchText=document.querySelector('.switch');
const button=document.querySelector('button');

if(title.innerText==='Login'){
title.innerText='Register';
button.innerText='Register';
switchText.innerText='Already have account? Login';
}else{
title.innerText='Login';
button.innerText='Login';
switchText.innerText="Don't have account? Register";
}
}
</script>

</body>
</html>
